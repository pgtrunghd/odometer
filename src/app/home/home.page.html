<ion-list class="ion-page">
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-title>Sổ bảo dưỡng</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content [fullscreen]="true" color="light">
    <ion-list [inset]="true">
      <ion-item>
        <ion-icon name="bicycle" color="success" slot="start"></ion-icon>
        <ion-label>Tổng số km:</ion-label>
        <ion-note slot="end" color="success"
          >{{ 2000000 | number: '1.0-0' }} km</ion-note
        >
      </ion-item>
      <ion-item>
        <ion-icon name="bicycle" color="success" slot="start"></ion-icon>

      </ion-list-header>
